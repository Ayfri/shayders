name = "shayders"
compatibility_date = "2026-02-22"
main = ".svelte-kit/cloudflare/_worker.js"
preview_urls = true
workers_dev = true

[placement]
mode = "smart"

[assets]
binding = "ASSETS"
directory = ".svelte-kit/cloudflare"

[[r2_buckets]]
binding = "ASSETS_STORAGE"
bucket_name = "shayders"

[observability.logs]
enabled = true
[observability.traces]
enabled = true
